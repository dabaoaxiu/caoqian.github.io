<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knova · 个人知识库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --surface2: #f4f3ef;
    --border: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-hint: #9e9e9a;
    --accent: #2d5be3;
    --accent-bg: #eef2fd;
    --accent-text: #1a3ba8;
    --tag-bg: #f0efe9;
    --tag-text: #4a4a44;
    --success: #1a7a4a;
    --success-bg: #e8f5ee;
    --warn-bg: #fef9ec;
    --warn: #7a5a10;
    --sidebar-w: 220px;
    --font-display: 'Lora', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --radius: 8px;
    --radius-lg: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 10;
    padding: 20px 0;
  }

  .logo {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .logo h1 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .nav-section {
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-hint);
    margin-top: 10px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 0;
    transition: all 0.15s;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
  .nav-item .icon { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .icon { opacity: 1; }
  .nav-item .badge {
    margin-left: auto;
    background: var(--surface2);
    border-radius: 20px;
    font-size: 11px;
    padding: 1px 7px;
    color: var(--text-hint);
  }
  .nav-item.active .badge { background: rgba(45,91,227,0.15); color: var(--accent-text); }

  .sidebar-tags {
    padding: 0 12px;
    margin-top: 4px;
  }
  .tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 20px;
    font-size: 12px;
    padding: 3px 10px;
    margin: 3px 3px 3px 0;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .tag-pill:hover { border-color: var(--border-mid); }
  .tag-pill.active { background: var(--accent-bg); color: var(--accent-text); border-color: rgba(45,91,227,0.25); }
  .tag-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── Main layout ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .topbar-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 500;
    flex: 1;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 420px;
  }
  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px 7px 34px;
    font-size: 14px;
    font-family: var(--font-body);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  .search-input:focus { border-color: var(--accent); background: var(--surface); }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-hint);
    width: 14px;
    height: 14px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: var(--font-body);
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border-mid);
    background: var(--surface);
    color: var(--text);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary {
    background: var(--accent);
    color: white;
    border-color: transparent;
  }
  .btn-primary:hover { background: #2450c8; }

  /* ── Content area ── */
  .content { padding: 24px 28px; flex: 1; }

  /* ── Stats row ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
  }
  .stat-label { font-size: 12px; color: var(--text-hint); margin-bottom: 4px; font-weight: 500; }
  .stat-value { font-size: 26px; font-family: var(--font-display); font-weight: 500; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .stat-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; }

  /* ── Section title ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  /* ── Card grid ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover { border-color: var(--border-mid); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .card-type-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-title { font-weight: 500; font-size: 14px; line-height: 1.4; flex: 1; }
  .card-body { font-size: 13px; color: var(--text-muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 12px; }
  .card-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .card-tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 20px;
    font-size: 11px;
    padding: 2px 8px;
  }
  .card-meta { margin-left: auto; font-size: 11px; color: var(--text-hint); }

  /* ── AI Ask panel ── */
  .ai-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .ai-panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, #f0f4ff 0%, #f8f9ff 100%);
  }
  .ai-badge {
    background: var(--accent);
    color: white;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    letter-spacing: 0.04em;
  }
  .ai-panel-title { font-weight: 500; font-size: 14px; flex: 1; }
  .ai-examples { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 20px; border-bottom: 1px solid var(--border); }
  .ai-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .ai-chip:hover { background: var(--accent-bg); color: var(--accent-text); border-color: rgba(45,91,227,0.25); }

  .ai-input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
  }
  .ai-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 14px;
    font-family: var(--font-body);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .ai-input:focus { border-color: var(--accent); background: var(--surface); }
  .ai-input::placeholder { color: var(--text-hint); }

  .ai-answer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: #f9fbff;
  }
  .ai-answer-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent-text);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ai-answer-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .ai-sources {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ai-source-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    padding: 3px 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .ai-source-chip::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* ── Add card modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    width: 560px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-md);
    padding: 28px;
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-close { cursor: pointer; color: var(--text-hint); font-size: 20px; line-height: 1; }
  .modal-close:hover { color: var(--text); }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 14px;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
  .form-select { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%239e9e9a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }

  .type-selector { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-option {
    flex: 1;
    min-width: 80px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
  }
  .type-option:hover { border-color: var(--border-mid); background: var(--surface2); }
  .type-option.selected { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-text); }
  .type-option .type-icon { font-size: 18px; margin-bottom: 4px; display: block; }

  .tag-input-wrap { display: flex; gap: 8px; }
  .current-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .current-tag {
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 20px;
    font-size: 12px;
    padding: 3px 10px;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .current-tag:hover { background: #ebe9e0; }
  .current-tag-x { font-size: 14px; line-height: 1; color: var(--text-hint); }

  .ai-suggest-wrap {
    background: var(--accent-bg);
    border: 1px solid rgba(45,91,227,0.15);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-top: 8px;
    font-size: 13px;
  }
  .ai-suggest-label { font-size: 11px; font-weight: 500; color: var(--accent-text); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .ai-suggest-text { color: var(--text-muted); line-height: 1.6; }

  /* ── Notification toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: white;
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 13px;
    z-index: 200;
    transform: translateY(12px);
    opacity: 0;
    transition: all 0.2s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-hint);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }

  /* ── Detail panel ── */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 50;
  }
  .detail-overlay.open { display: block; }
  .detail-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 480px;
    max-width: 95vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 51;
    overflow-y: auto;
    padding: 28px;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  .detail-panel.open { transform: translateX(0); }
  .detail-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
  .detail-back { cursor: pointer; color: var(--text-hint); font-size: 13px; display: flex; align-items: center; gap: 4px; margin-bottom: 16px; transition: color 0.15s; }
  .detail-back:hover { color: var(--text); }
  .detail-title { font-family: var(--font-display); font-size: 20px; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }
  .detail-meta { font-size: 12px; color: var(--text-hint); display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .detail-body { font-size: 15px; line-height: 1.8; color: var(--text-muted); }
  .detail-section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-hint);
    margin: 20px 0 10px;
  }
  .detail-ai-box {
    background: var(--accent-bg);
    border: 1px solid rgba(45,91,227,0.15);
    border-radius: var(--radius-lg);
    padding: 16px;
  }
  .detail-ai-box p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

  /* ── Loading spinner ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(45,91,227,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  /* View toggle */
  .view-toggle { display: flex; gap: 2px; background: var(--surface2); border-radius: 6px; padding: 2px; }
  .view-btn {
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-hint);
    transition: all 0.15s;
    font-size: 13px;
  }
  .view-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

  /* List view */
  .list-view .card-grid { grid-template-columns: 1fr; }
  .list-view .card { padding: 14px 18px; }
  .list-view .card-body { -webkit-line-clamp: 2; }

  @media (max-width: 768px) {
    :root { --sidebar-w: 0px; }
    .sidebar { display: none; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .content { padding: 16px; }
    .topbar { padding: 10px 16px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <h1>Kno<span>va</span></h1>
  </div>

  <div class="nav-section">导航</div>
  <div class="nav-item active" onclick="switchView('all')">
    <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
    全部知识
    <span class="badge" id="count-all">0</span>
  </div>
  <div class="nav-item" onclick="switchView('note')">
    <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 4h10M3 8h10M3 12h6"/></svg>
    学习笔记
    <span class="badge" id="count-note">0</span>
  </div>
  <div class="nav-item" onclick="switchView('concept')">
    <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5"/><path d="M8 5v3l2 1"/></svg>
    概念卡片
    <span class="badge" id="count-concept">0</span>
  </div>
  <div class="nav-item" onclick="switchView('method')">
    <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 10l4-6 4 4 4-5"/></svg>
    方法论
    <span class="badge" id="count-method">0</span>
  </div>
  <div class="nav-item" onclick="switchView('quote')">
    <svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 7c0-1.1.9-2 2-2h.5V3.5A2.5 2.5 0 004 6v1zm6 0c0-1.1.9-2 2-2h.5V3.5A2.5 2.5 0 0010 6v1zM4 7v4h4V7H4zm6 0v4h4V7h-4z"/></svg>
    金句摘录
    <span class="badge" id="count-quote">0</span>
  </div>

  <div class="nav-section">标签</div>
  <div class="sidebar-tags" id="sidebar-tags"></div>
</aside>

<!-- Main -->
<div class="main">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-title" id="view-title">全部知识</div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5l3 3"/></svg>
      <input class="search-input" type="text" placeholder="搜索知识..." id="search-input" oninput="handleSearch()" />

  </div>

  <!-- Content -->
  <div class="content" id="main-content">

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card">
        <div class="stat-label">总条目</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-sub"><span class="stat-dot" style="background:#2d5be3"></span>个人知识库</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">本周新增</div>
        <div class="stat-value" id="stat-week">0</div>
        <div class="stat-sub"><span class="stat-dot" style="background:#1a7a4a"></span>持续积累中</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">标签数</div>
        <div class="stat-value" id="stat-tags">0</div>
        <div class="stat-sub"><span class="stat-dot" style="background:#7a5a10"></span>分类整理</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">AI问答次数</div>
        <div class="stat-value" id="stat-ai">0</div>
        <div class="stat-sub"><span class="stat-dot" style="background:#993556"></span>知识检索</div>
      </div>
    </div>

    <!-- AI Ask -->
    <div class="ai-panel" id="ai-panel-section">
      <div class="ai-panel-header">
        <span class="ai-badge">AI</span>

      </div>
      <div class="ai-examples">
        <div class="ai-chip" onclick="fillAI('帮我找所有关于产品设计的笔记')">帮我找所有关于产品设计的笔记</div>
        <div class="ai-chip" onclick="fillAI('总结我的竞品分析方法论')">总结我的竞品分析方法论</div>

      </div>
      <div class="ai-input-row">
        <input class="ai-input" type="text" placeholder="问你的知识库任何问题……" id="ai-input" onkeydown="if(event.key==='Enter')askAI()" />
        <button class="btn btn-primary" onclick="askAI()" id="ai-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 7h10M7 2l5 5-5 5"/></svg>
          发送
        </button>
      </div>
      <div class="ai-answer hidden" id="ai-answer">
        <div class="ai-answer-label">
          <span class="spinner" id="ai-spinner" style="display:none"></span>
          <span id="ai-answer-title">AI 回答</span>
        </div>
        <div class="ai-answer-text" id="ai-answer-text"></div>
        <div class="ai-sources" id="ai-sources"></div>
      </div>
    </div>

    <!-- Cards -->
    <div class="section-header">
      <div class="section-title" id="section-label">最近添加</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <select onchange="sortCards(this.value)" style="font-size:12px;border:1px solid var(--border);border-radius:6px;padding:4px 24px 4px 8px;background:var(--surface);color:var(--text-muted);outline:none;font-family:var(--font-body);appearance:none;background-image:url('data:image/svg+xml,%3Csvg width=\'10\' height=\'6\' viewBox=\'0 0 10 6\' fill=\'none\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cpath d=\'M1 1L5 5L9 1\' stroke=\'%239e9e9a\' stroke-width=\'1.5\' stroke-linecap=\'round\' stroke-linejoin=\'round\'/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 8px center;cursor:pointer;">
          <option value="date">按时间</option>
          <option value="type">按类型</option>
          <option value="title">按标题</option>
        </select>
      </div>
    </div>

    <div class="card-grid" id="card-grid"></div>
    <div id="empty-state" class="empty hidden">
      <div class="empty-icon">📭</div>
      <h3>暂无内容</h3>
      <p>点击「添加知识」开始记录你的第一条知识</p>
    </div>

  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      添加知识
      <span class="modal-close" onclick="closeAddModal()">×</span>
    </div>

    <div class="form-group">
      <label class="form-label">知识类型</label>
      <div class="type-selector">
        <div class="type-option selected" data-type="note" onclick="selectType(this)">
          <span class="type-icon">📝</span>学习笔记
        </div>
        <div class="type-option" data-type="concept" onclick="selectType(this)">
          <span class="type-icon">💡</span>概念卡片
        </div>
        <div class="type-option" data-type="method" onclick="selectType(this)">
          <span class="type-icon">🔧</span>方法论
        </div>
        <div class="type-option" data-type="quote" onclick="selectType(this)">
          <span class="type-icon">💬</span>金句摘录
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">标题</label>
      <input class="form-input" type="text" placeholder="知识标题…" id="form-title" />
    </div>

    <div class="form-group">
      <label class="form-label">内容</label>
      <textarea class="form-textarea" placeholder="写下你的思考、笔记或摘录…" id="form-body"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">来源（可选）</label>
      <input class="form-input" type="text" placeholder="书名、课程、文章链接…" id="form-source" />
    </div>

    <div class="form-group">
      <label class="form-label">标签</label>
      <div class="tag-input-wrap">
        <input class="form-input" type="text" placeholder="输入标签后按 Enter 添加" id="tag-input" onkeydown="handleTagInput(event)" style="flex:1" />
        <button class="btn" onclick="addTag()">添加</button>
      </div>
      <div class="current-tags" id="current-tags"></div>
    </div>

    <div class="ai-suggest-wrap" id="ai-suggest" style="display:none">
      <div class="ai-suggest-label">✦ AI 建议摘要</div>
      <div class="ai-suggest-text" id="ai-suggest-text"></div>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
      <button class="btn" onclick="closeAddModal()">取消</button>
      <button class="btn" onclick="generateSummary()" id="summary-btn">
        ✦ AI 生成摘要
      </button>
      <button class="btn btn-primary" onclick="saveCard()">保存到知识库</button>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-back" onclick="closeDetail()">← 返回</div>
  <div id="detail-content"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const TYPE_META = {
  note:    { label:'学习笔记', color:'#2d5be3', bg:'#eef2fd', icon:'📝' },
  concept: { label:'概念卡片', color:'#1a7a4a', bg:'#e8f5ee', icon:'💡' },
  method:  { label:'方法论',   color:'#7a5a10', bg:'#fef9ec', icon:'🔧' },
  quote:   { label:'金句摘录', color:'#993556', bg:'#fbeaf0', icon:'💬' },
};

let cards = JSON.parse(localStorage.getItem('knova_cards') || '[]');
let aiCount = parseInt(localStorage.getItem('knova_ai') || '0');
let currentType = 'all';
let currentTag = null;
let currentTags = [];
let selectedType = 'note';
let searchQ = '';
let sortMode = 'date';
let viewMode = 'grid';
let currentDetailId = null;

// ── Seed demo data if empty ──
if (cards.length === 0) {
  const now = Date.now();
  cards = [
    { id: 1, type: 'note', title: 'RAG（检索增强生成）技术原理', body: 'RAG是一种将外部知识库与大语言模型结合的技术架构。核心流程：用户输入 → 向量检索TopK相关文档 → 将文档作为上下文 → LLM生成有来源引用的回答。相比纯粹的LLM，RAG能大幅减少幻觉、提升答案的准确性和可引用性。常用向量数据库：Milvus、Faiss、Pinecone。', source: '腾讯产品训练营', tags: ['AI','技术','知识管理'], date: now - 86400000*2, summary: 'RAG通过向量检索让大模型能引用个人知识库中的真实内容，是知识库问答系统的核心技术。' },
    { id: 2, type: 'concept', title: '北极星指标（NSM）', body: '北极星指标是能最好反映产品核心价值的单一指标，所有团队的努力都围绕它展开。好的NSM必须：①能反映用户真实获得的价值 ②与商业目标正相关 ③可被拆解为二级指标。错误示例：DAU（不代表价值）。正确示例：微信读书"人均知识库内容条数"——反映用户真正从阅读中沉淀了知识。', source: '产品方法论学习', tags: ['产品','数据指标'], date: now - 86400000*5, summary: '用单一指标对齐全团队，衡量用户真正从产品中获得的价值。' },
    { id: 3, type: 'method', title: 'SWOT分析框架', body: 'SWOT = Strengths（优势）/ Weaknesses（劣势）/ Opportunities（机会）/ Threats（威胁）。优势劣势是内部因素，机会威胁是外部环境。使用时注意：① 优势要"相对于竞品"才有意义 ② 威胁要指出具体时间窗口 ③ 最终要输出SO/ST/WO/WT四种策略组合，而不仅仅是列举四象限。', source: '微信读书竞品报告', tags: ['分析框架','产品'], date: now - 86400000*1, summary: '通过内外部因素的四象限分析，输出差异化竞争策略。' },
    { id: 4, type: 'quote', title: '「读了忘、笔记难管理」是阅读的核心痛点', body: '"用户在阅读过程中产生大量划线和AI问答，但这些碎片化内容最终沉睡在笔记列表里，无法形成结构化知识，导致「知道自己在读书，却感受不到自己在成长」的认知落差。"', source: '微信读书AI助手产品分析', tags: ['产品洞察','知识管理'], date: now - 86400000*3, summary: '工具应将碎片信息转化为结构化知识资产，而非仅仅记录。' },
    { id: 5, type: 'note', title: 'A/B Test 实验设计要点', body: '① 明确假设：提前定义"如果X，则Y会提升Z%"② 单变量原则：每次只改变一个变量③ 样本量计算：用功效分析确定最小样本，避免早停④ 实验周期：至少覆盖完整业务周期（通常7-14天）⑤ 成功标准：提前定义主指标+护栏指标⑥ 分析陷阱：多重检验需Bonferroni校正，避免显著性p-hacking。', source: '腾讯产品训练营', tags: ['产品','数据分析','实验设计'], date: now - 86400000*6, summary: '规范的A/B实验需要提前锁定假设、单变量、足够样本量和完整周期。' },
    { id: 6, type: 'concept', title: '向量数据库（Vector DB）', body: '将文本、图像等非结构化数据转为高维向量，并以向量相似度（余弦相似度、欧氏距离）为基础进行检索的数据库系统。核心场景：语义搜索、推荐系统、RAG知识库。主流产品：Milvus（开源，适合大规模生产）、Faiss（Meta出品，适合研究）、Pinecone（云服务，易上手）、Chroma（轻量级）。', source: '技术学习笔记', tags: ['AI','技术','数据库'], date: now - 86400000*7, summary: '向量数据库是语义搜索和RAG系统的底层基础设施。' },
  ];
  saveData();
}

function saveData() {
  localStorage.setItem('knova_cards', JSON.stringify(cards));
  localStorage.setItem('knova_ai', aiCount);
}

// ── Render ──
function render() {
  updateStats();
  renderSidebarTags();
  renderCards();
}

function updateStats() {
  const total = cards.length;
  const weekAgo = Date.now() - 7*86400000;
  const week = cards.filter(c => c.date > weekAgo).length;
  const allTags = [...new Set(cards.flatMap(c => c.tags))];
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-week').textContent = week;
  document.getElementById('stat-tags').textContent = allTags.length;
  document.getElementById('stat-ai').textContent = aiCount;
  // nav badges
  ['all','note','concept','method','quote'].forEach(t => {
    const el = document.getElementById('count-' + t);
    if (el) el.textContent = t === 'all' ? cards.length : cards.filter(c=>c.type===t).length;
  });
}

function renderSidebarTags() {
  const allTags = [...new Set(cards.flatMap(c => c.tags))].sort();
  const wrap = document.getElementById('sidebar-tags');
  const colors = ['#2d5be3','#1a7a4a','#7a5a10','#993556','#6b4fa0','#0e7490'];
  wrap.innerHTML = allTags.map((t,i) =>
    `<div class="tag-pill ${currentTag===t?'active':''}" onclick="filterTag('${t}')">
      <span class="tag-dot" style="background:${colors[i%colors.length]}"></span>${t}
    </div>`
  ).join('');
}

function getFilteredCards() {
  let filtered = [...cards];
  if (currentType !== 'all') filtered = filtered.filter(c => c.type === currentType);
  if (currentTag) filtered = filtered.filter(c => c.tags.includes(currentTag));
  if (searchQ) {
    const q = searchQ.toLowerCase();
    filtered = filtered.filter(c =>
      c.title.toLowerCase().includes(q) ||
      c.body.toLowerCase().includes(q) ||
      c.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  if (sortMode === 'date') filtered.sort((a,b) => b.date - a.date);
  else if (sortMode === 'type') filtered.sort((a,b) => a.type.localeCompare(b.type));
  else if (sortMode === 'title') filtered.sort((a,b) => a.title.localeCompare(b.title));
  return filtered;
}

function renderCards() {
  const filtered = getFilteredCards();
  const grid = document.getElementById('card-grid');
  const empty = document.getElementById('empty-state');
  grid.innerHTML = '';
  if (filtered.length === 0) {
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  filtered.forEach(card => {
    const m = TYPE_META[card.type];
    const dateStr = new Date(card.date).toLocaleDateString('zh-CN', {month:'short',day:'numeric'});
    grid.innerHTML += `
      <div class="card" onclick="openDetail(${card.id})">
        <div class="card-type-strip" style="background:${m.color}"></div>
        <div class="card-header">
          <div class="card-icon" style="background:${m.bg};font-size:16px">${m.icon}</div>
          <div class="card-title">${escHtml(card.title)}</div>
        </div>
        <div class="card-body">${escHtml(card.body)}</div>
        <div class="card-footer">
          <span style="background:${m.bg};color:${m.color};border-radius:20px;font-size:11px;padding:2px 8px;font-weight:500">${m.label}</span>
          ${card.tags.map(t=>`<span class="card-tag">${escHtml(t)}</span>`).join('')}
          <span class="card-meta">${dateStr}</span>
        </div>
      </div>`;
  });
}

// ── Navigation ──
function switchView(type) {
  currentType = type;
  currentTag = null;
  const titles = { all:'全部知识', note:'学习笔记', concept:'概念卡片', method:'方法论', quote:'金句摘录' };
  document.getElementById('view-title').textContent = titles[type];
  document.getElementById('section-label').textContent = titles[type];
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderCards();
  renderSidebarTags();
}

function filterTag(tag) {
  currentTag = currentTag === tag ? null : tag;
  document.getElementById('section-label').textContent = currentTag ? `标签：${currentTag}` : '全部知识';
  renderSidebarTags();
  renderCards();
}

function handleSearch() {
  searchQ = document.getElementById('search-input').value;
  document.getElementById('section-label').textContent = searchQ ? `搜索：${searchQ}` : '全部知识';
  renderCards();
}

function sortCards(mode) {
  sortMode = mode;
  renderCards();
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('main-content').classList.toggle('list-view', mode === 'list');
  document.getElementById('vb-grid').classList.toggle('active', mode === 'grid');
  document.getElementById('vb-list').classList.toggle('active', mode === 'list');
}

// ── Detail Panel ──
function openDetail(id) {
  const card = cards.find(c => c.id === id);
  if (!card) return;
  currentDetailId = id;
  const m = TYPE_META[card.type];
  const dateStr = new Date(card.date).toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});
  document.getElementById('detail-content').innerHTML = `
    <div style="height:4px;border-radius:4px;background:${m.color};margin-bottom:20px;"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <span style="background:${m.bg};color:${m.color};border-radius:20px;font-size:12px;padding:3px 10px;font-weight:500">${m.icon} ${m.label}</span>
    </div>
    <div class="detail-title">${escHtml(card.title)}</div>
    <div class="detail-meta">
      <span>📅 ${dateStr}</span>
      ${card.source ? `<span>📖 ${escHtml(card.source)}</span>` : ''}
    </div>
    <div class="detail-tags">${card.tags.map(t=>`<span class="card-tag">${escHtml(t)}</span>`).join('')}</div>
    <div class="detail-body">${escHtml(card.body).replace(/\n/g,'<br>')}</div>
    ${card.summary ? `
      <div class="detail-section-label">✦ AI 摘要</div>
      <div class="detail-ai-box"><p>${escHtml(card.summary)}</p></div>
    ` : ''}
    <div style="display:flex;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);">
      <button class="btn" onclick="deleteCard(${id})" style="color:#993556;border-color:#f7c1c1">删除</button>
    </div>
  `;
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
}

function deleteCard(id) {
  if (!confirm('确认删除这条知识？')) return;
  cards = cards.filter(c => c.id !== id);
  saveData();
  closeDetail();
  render();
  showToast('已删除');
}

// ── Add Modal ──
function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('form-title').value = '';
  document.getElementById('form-body').value = '';
  document.getElementById('form-source').value = '';
  document.getElementById('tag-input').value = '';
  currentTags = [];
  selectedType = 'note';
  document.querySelectorAll('.type-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.type === 'note');
  });
  document.getElementById('current-tags').innerHTML = '';
  document.getElementById('ai-suggest').style.display = 'none';
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

document.getElementById('add-modal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});

function selectType(el) {
  selectedType = el.dataset.type;
  document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function handleTagInput(e) {
  if (e.key === 'Enter') { e.preventDefault(); addTag(); }
}

function addTag() {
  const input = document.getElementById('tag-input');
  const tag = input.value.trim();
  if (!tag || currentTags.includes(tag)) { input.value = ''; return; }
  currentTags.push(tag);
  input.value = '';
  renderCurrentTags();
}

function removeTag(tag) {
  currentTags = currentTags.filter(t => t !== tag);
  renderCurrentTags();
}

function renderCurrentTags() {
  document.getElementById('current-tags').innerHTML = currentTags.map(t =>
    `<div class="current-tag" onclick="removeTag('${t}')"><span>${escHtml(t)}</span><span class="current-tag-x">×</span></div>`
  ).join('');
}

async function generateSummary() {
  const title = document.getElementById('form-title').value.trim();
  const body = document.getElementById('form-body').value.trim();
  if (!title && !body) { showToast('请先填写内容'); return; }
  const btn = document.getElementById('summary-btn');
  btn.textContent = '生成中…';
  btn.disabled = true;
  const suggest = document.getElementById('ai-suggest');
  suggest.style.display = 'block';
  document.getElementById('ai-suggest-text').textContent = '正在生成摘要…';
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `请为以下知识卡片生成一句话中文摘要（20-40字，直接输出摘要，不需要任何前缀）：\n\n标题：${title}\n\n内容：${body}`
        }]
      })
    });
    const data = await resp.json();
    const summary = data.content?.[0]?.text?.trim() || '无法生成摘要';
    document.getElementById('ai-suggest-text').textContent = summary;
    window._pendingSummary = summary;
  } catch(e) {
    document.getElementById('ai-suggest-text').textContent = '生成失败，请检查网络连接';
  }
  btn.textContent = '✦ AI 生成摘要';
  btn.disabled = false;
}

function saveCard() {
  const title = document.getElementById('form-title').value.trim();
  const body = document.getElementById('form-body').value.trim();
  if (!title) { showToast('请填写标题'); return; }
  if (!body) { showToast('请填写内容'); return; }
  const card = {
    id: Date.now(),
    type: selectedType,
    title, body,
    source: document.getElementById('form-source').value.trim(),
    tags: [...currentTags],
    date: Date.now(),
    summary: window._pendingSummary || ''
  };
  window._pendingSummary = '';
  cards.unshift(card);
  saveData();
  closeAddModal();
  render();
  showToast('✓ 已保存到知识库');
}

// ── AI Q&A ──
function fillAI(q) {
  document.getElementById('ai-input').value = q;
  askAI();
}

async function askAI() {
  const q = document.getElementById('ai-input').value.trim();
  if (!q) return;
  const answerBox = document.getElementById('ai-answer');
  const answerText = document.getElementById('ai-answer-text');
  const answerSources = document.getElementById('ai-sources');
  const spinner = document.getElementById('ai-spinner');
  const titleEl = document.getElementById('ai-answer-title');
  answerBox.classList.remove('hidden');
  spinner.style.display = 'inline-block';
  titleEl.textContent = '正在检索…';
  answerText.textContent = '';
  answerSources.innerHTML = '';
  aiCount++;
  saveData();
  document.getElementById('stat-ai').textContent = aiCount;
  const relevant = getRelevantCards(q);
  const context = relevant.map((c,i) =>
    `[${i+1}] ${c.title}（${TYPE_META[c.type].label}）\n${c.body}${c.summary ? '\n摘要：'+c.summary : ''}`
  ).join('\n\n');
  const systemPrompt = `你是用户的个人知识库AI助手。根据用户的知识库内容回答问题，尽量引用知识库中的具体内容。回答要简洁、中文、有见地。如果知识库中没有相关内容，请诚实说明并基于通用知识回答。`;
  const userMsg = `知识库内容：\n${context || '（知识库暂无相关内容）'}\n\n用户问题：${q}`;
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }]
      })
    });
    const data = await resp.json();
    const answer = data.content?.[0]?.text?.trim() || '抱歉，暂时无法回答';
    answerText.textContent = answer;
    titleEl.textContent = 'AI 回答';
    if (relevant.length > 0) {
      answerSources.innerHTML = '<span style="font-size:11px;color:var(--text-hint);margin-right:6px">引用来源：</span>' +
        relevant.map(c => `<div class="ai-source-chip">${escHtml(c.title)}</div>`).join('');
    }
  } catch(e) {
    answerText.textContent = '暂时无法连接AI服务，请检查网络。';
    titleEl.textContent = '连接失败';
  }
  spinner.style.display = 'none';
}

function getRelevantCards(q) {
  const words = q.toLowerCase().split(/\s+/);
  return cards
    .map(c => {
      const text = (c.title + ' ' + c.body + ' ' + c.tags.join(' ') + ' ' + (c.summary||'')).toLowerCase();
      const score = words.reduce((s, w) => s + (text.includes(w) ? 1 : 0), 0);
      return { ...c, score };
    })
    .filter(c => c.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 3);
}

// ── Helpers ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
